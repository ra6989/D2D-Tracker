<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>D2D Field Tracker — AT&T Fiber</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f;--surface:#13131a;--card:#1a1a24;--card2:#1e1e2a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f5;--muted:#888899;--dim:#44445a;
  --green:#22c97a;--green-dim:rgba(34,201,122,0.13);
  --amber:#f5a623;--amber-dim:rgba(245,166,35,0.13);
  --blue:#4da6ff;--blue-dim:rgba(77,166,255,0.13);
  --purple:#b794f4;--purple-dim:rgba(183,148,244,0.13);
  --red:#ff6b6b;--red-dim:rgba(255,107,107,0.13);
  --teal:#2dd4bf;--teal-dim:rgba(45,212,191,0.13);
  --orange:#fb923c;--orange-dim:rgba(251,146,60,0.13);
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:14px;}

.hdr{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
.hdr-top{display:flex;justify-content:space-between;align-items:center;padding:12px 14px 8px;}
.hdr-title{font-size:17px;font-weight:600;}
.hdr-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:1px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--dim);display:inline-block;margin-right:5px;transition:background .3s;}
.sync-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);}
.sync-dot.syncing{background:var(--amber);}
.sync-label{font-size:11px;color:var(--muted);}

/* Territory tabs */
.terr-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 10px 10px;}
.terr-tab{padding:9px 12px;border-radius:9px;border:1px solid var(--border2);background:var(--card);color:var(--muted);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;}
.terr-tab.active{border-color:var(--blue);background:var(--blue-dim);color:var(--blue);}

.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:0 10px 10px;}
.stat{background:var(--card);border-radius:8px;padding:6px 8px;text-align:center;border:1px solid var(--border);}
.stat-n{font-family:var(--mono);font-size:16px;font-weight:500;line-height:1;}
.stat-l{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.06em;}
.n-sold{color:var(--green);}.n-follow{color:var(--amber);}.n-no{color:var(--dim);}

.name-bar{display:flex;gap:6px;padding:0 10px 10px;}
.name-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border2);background:var(--card);color:var(--muted);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center;}
.name-btn.active{border-color:var(--blue);background:var(--blue-dim);color:var(--blue);}

.legend-bar{display:flex;gap:10px;padding:0 10px 8px;overflow-x:auto;scrollbar-width:none;}
.legend-bar::-webkit-scrollbar{display:none;}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);white-space:nowrap;}
.leg-dot{width:7px;height:7px;border-radius:50%;}

.content{padding:8px 10px 40px;}
.territory-section{display:none;}.territory-section.active{display:block;}

.zone-wrap{margin-bottom:10px;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--card);}
.zone-hdr{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:10px;}
.zone-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:500;flex-shrink:0;}
.ico-a,.ico-d{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,201,122,.2);}
.ico-b,.ico-e{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,166,35,.2);}
.ico-c,.ico-f{background:rgba(136,153,170,.1);color:#8899aa;border:1px solid rgba(136,153,170,.2);}
.zone-info{flex:1;}
.zone-name{font-size:14px;font-weight:600;}
.zone-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.zone-chev{font-size:10px;color:var(--dim);transition:transform .2s;}
.zone-chev.open{transform:rotate(180deg);}
.zone-body{display:none;border-top:1px solid var(--border);}
.zone-body.open{display:block;}

.street-section{border-bottom:1px solid var(--border);}
.street-section:last-child{border-bottom:none;}
.street-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:rgba(255,255,255,.02);}
.street-name-label{font-size:13px;font-weight:600;color:var(--text);}
.street-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.street-right{display:flex;align-items:center;gap:6px;}
.street-count{font-family:var(--mono);font-size:11px;color:var(--muted);}
.s-chev{font-size:9px;color:var(--dim);transition:transform .2s;}
.s-chev.open{transform:rotate(180deg);}
.street-doors{display:none;}.street-doors.open{display:block;}

.door-row{display:flex;align-items:center;padding:9px 14px;border-top:1px solid rgba(255,255,255,.04);gap:8px;transition:background .15s;}
.door-row:hover{background:rgba(255,255,255,.02);}
.door-addr{flex:0 0 auto;}
.door-num{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text);}
.door-tags{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap;}
.tag{font-size:9px;font-weight:500;padding:1px 5px;border-radius:4px;}
.tag-wrls{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,201,122,.2);}
.tag-cpb{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(77,166,255,.2);}
.tag-both{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(183,148,244,.2);}
.door-mid{flex:1;min-width:0;}
.door-status-wrap{display:flex;align-items:center;gap:6px;}
.door-select{width:100%;padding:6px 8px;border-radius:7px;border:1px solid var(--border2);background:var(--card2);color:var(--text);font-family:var(--font);font-size:12px;appearance:none;-webkit-appearance:none;cursor:pointer;}
.door-select:focus{outline:none;border-color:var(--blue);}
.door-select.status-sold{border-color:var(--green);background:var(--green-dim);color:var(--green);}
.door-select.status-follow{border-color:var(--amber);background:var(--amber-dim);color:var(--amber);}
.door-select.status-comeback{border-color:var(--teal);background:var(--teal-dim);color:var(--teal);}
.door-select.status-not-home,.door-select.status-no{border-color:var(--dim);color:var(--muted);}
.door-select.status-not-interested{border-color:var(--red);background:var(--red-dim);color:var(--red);}
.door-note-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:var(--card2);color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.door-note-btn.has-note{border-color:var(--amber);color:var(--amber);background:var(--amber-dim);}
.door-note-row{display:none;padding:0 14px 10px;}
.door-note-row.open{display:flex;gap:6px;}
.door-note-input{flex:1;padding:7px 10px;border-radius:7px;border:1px solid var(--border2);background:var(--card2);color:var(--text);font-family:var(--font);font-size:12px;resize:none;}
.door-note-input:focus{outline:none;border-color:var(--amber);}
.note-save-btn{padding:7px 12px;border-radius:7px;border:1px solid rgba(245,166,35,.3);background:var(--amber-dim);color:var(--amber);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;}
.rep-chip{font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;background:var(--blue-dim);color:var(--blue);border:1px solid rgba(77,166,255,.2);white-space:nowrap;margin-top:3px;display:inline-block;}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:flex-end;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border-radius:16px 16px 0 0;border-top:1px solid var(--border2);width:100%;padding:20px 16px 32px;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:12px;}
.modal-input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border2);background:var(--card2);color:var(--text);font-family:var(--font);font-size:15px;margin-bottom:10px;}
.modal-input:focus{outline:none;border-color:var(--blue);}
.modal-btn{width:100%;padding:14px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:13px;color:var(--text);z-index:999;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="hdr">

    <div>

    </div>

      <div><span class="sync-dot" id="syncDot"></span><span class="sync-label" id="syncLabel">Connecting...</span></div>

    </div>
  </div>

  <div class="terr-tabs">

  <div class="stats-bar">

    <div class="stat"><div class="stat-n" style="color:var(--muted)" id="statWorked">0</div><div class="stat-l">Worked</div></div>
  </div>

  <div class="name-bar">
    <button class="name-btn" id="nameBtn" onclick="showNameModal()">👤 Set Your Name</button>
  </div>
</div>

<div class="legend-bar">

</div>

<div class="content">

</div>

<div class="modal-bg" id="nameModal">
  <div class="modal">
    <div class="modal-title">Who are you?</div>
    <input class="modal-input" id="nameModalInput" placeholder="Your name (e.g. Rudy)" maxlength="20">
    <button class="modal-btn" onclick="saveName()">Let's go 🔥</button>
  </div>
</div>

<div class="toast" id="toast"></div>

const STATUS_OPTIONS = [
  {val:'',label:'— Not visited'},
  {val:'sold',label:'✅ Sold'},
  {val:'follow',label:'🔁 Follow Up'},
  {val:'comeback',label:'🕐 Come Back'},
  {val:'not-home',label:'🚪 Not Home'},
  {val:'no',label:'❌ No Answer'},
  {val:'not-interested',label:'🚫 Not Interested'},
];

let state = {};
let myName = localStorage.getItem('d2d_myname') || '';
let currentTerritory = 1;
let lastPullHash = '';

function doorKey(n, s) { return `${n}|${s}`; }

async function pullState() {
  try {
    const r = await window.storage.get('attd2d_v4_philo_combined', true);
    if (r && r.value) {
      const hash = r.value.slice(0,40);
      if (hash === lastPullHash) { setSyncStatus('live'); return; }
      lastPullHash = hash;
      state = JSON.parse(r.value.slice(40));
      refreshDoors();
      updateStats();
    }
    setSyncStatus('live');
  } catch(e) { setSyncStatus('error'); }
}

async function pushState() {
  setSyncStatus('syncing');
  try {
    const hash = String(Date.now()).padStart(40,'0').slice(-40);
    await window.storage.set('attd2d_v4_philo_combined', hash + JSON.stringify(state), true);
    lastPullHash = hash;
    setSyncStatus('live');
  } catch(e) { setSyncStatus('error'); }
}

function setSyncStatus(s) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + (s==='live'?'live':s==='syncing'?'syncing':'');
  lbl.textContent = s==='live'?'Live':s==='syncing'?'Syncing...':'Offline';
}

function switchTerritory(t) {
  currentTerritory = t;
  document.getElementById('tab1').classList.toggle('active', t===1);
  document.getElementById('tab2').classList.toggle('active', t===2);
  document.getElementById('territory1').classList.toggle('active', t===1);
  document.getElementById('territory2').classList.toggle('active', t===2);
  updateStats();
}

function showNameModal() {
  document.getElementById('nameModal').classList.add('open');
  document.getElementById('nameModalInput').value = myName;
  setTimeout(()=>document.getElementById('nameModalInput').focus(),100);
}
function saveName() {
  const v = document.getElementById('nameModalInput').value.trim();
  if(!v) return;
  myName = v;
  localStorage.setItem('d2d_myname', v);
  document.getElementById('nameModal').classList.remove('open');
  document.getElementById('repLabel').textContent = '👤 ' + myName;
  document.getElementById('nameBtn').textContent = '👤 ' + myName;
  document.getElementById('nameBtn').classList.add('active');
  showToast('Name set: ' + myName);
}
document.getElementById('nameModalInput').addEventListener('keydown', e => { if(e.key==='Enter') saveName(); });
document.getElementById('nameModal').addEventListener('click', e => { if(e.target===document.getElementById('nameModal')) document.getElementById('nameModal').classList.remove('open'); });

function tagBadges(t) {
  if(!t) return '';
  if(t==='Both') return '<span class="tag tag-both">Both</span>';
  let o='';
  if(t==='Wrls') o+='<span class="tag tag-wrls">Wrls</span>';
  if(t==='CprBB') o+='<span class="tag tag-cpb">CprBB</span>';
  return o;
}

function selClass(v) { return v ? 'status-'+v : ''; }

function buildOptions(cur) {
  return STATUS_OPTIONS.map(o=>`<option value="${o.val}"${cur===o.val?' selected':''}>${o.label}</option>`).join('');
}

function buildZones(containerId, territory, allDoors) {
  const el = document.getElementById(containerId);
  let html = '';
  Object.entries(territory.zones).forEach(([zid, zone]) => {
    const ico = zone.ico;
    html += `<div class="zone-wrap">
      <div class="zone-hdr" onclick="toggleZone('z${zid}','chev${zid}')">
        <div class="zone-ico ${ico}">${zid}</div>
        <div class="zone-info">
          <div class="zone-name">${zone.label}</div>
          <div class="zone-meta">${zone.streets.length} streets</div>
        </div>
        <span class="zone-chev open" id="chev${zid}">▼</span>
      </div>
      <div class="zone-body open" id="z${zid}">`;

    zone.streets.forEach(streetName => {
      const doors = allDoors.filter(d => d.s === streetName);
      if(!doors.length) return;
      const sid = 'st_' + streetName.replace(/[^a-zA-Z0-9]/g,'_');
      html += `<div class="street-section">
        <div class="street-hdr" onclick="toggleStreet('${sid}','sch_${sid}')">
          <div>
            <div class="street-name-label">${streetName.replace(' 78729','').replace(' Extended','')}</div>
            <div class="street-meta">${doors.length} doors</div>
          </div>
          <div class="street-right">
            <span class="street-count" id="sc_${sid}"></span>
            <span class="s-chev open" id="sch_${sid}">▼</span>
          </div>
        </div>
        <div class="street-doors open" id="${sid}">`;

      doors.forEach(d => {
        const key = doorKey(d.n, d.s);
        const s = state[key] || {};
        html += `<div class="door-row">
          <div class="door-addr">
            <div class="door-num">${d.n}</div>
            <div class="door-tags">${tagBadges(d.t)}</div>
            <div class="rep-chip" id="rep_${key}">${s.rep?'👤 '+s.rep:''}</div>
          </div>
          <div class="door-mid">
            <div class="door-status-wrap">
              <select class="door-select ${selClass(s.status||'')}" id="sel_${key}" onchange="onStatus('${key}',this.value)">
                ${buildOptions(s.status||'')}
              </select>
              <button class="door-note-btn${s.note?' has-note':''}" id="nbtn_${key}" onclick="toggleNote('${key}')">📝</button>
            </div>
          </div>
        </div>
        <div class="door-note-row" id="nrow_${key}">
          <textarea class="door-note-input" id="ninp_${key}" rows="2" placeholder="Add a note...">${s.note||''}</textarea>
          <button class="note-save-btn" onclick="saveNote('${key}')">Save</button>
        </div>`;
      });

      html += `</div></div>`;
    });
    html += `</div></div>`;
  });
  el.innerHTML = html;
}

function toggleZone(bodyId, chevId) {
  const b = document.getElementById(bodyId), c = document.getElementById(chevId);
  const o = b.classList.toggle('open'); c.classList.toggle('open', o);
}
function toggleStreet(bodyId, chevId) {
  const b = document.getElementById(bodyId), c = document.getElementById(chevId);
  const o = b.classList.toggle('open'); c.classList.toggle('open', o);
}
function toggleNote(key) {
  const row = document.getElementById('nrow_'+key);
  const o = row.classList.toggle('open');
  if(o) document.getElementById('ninp_'+key).focus();
}

async function onStatus(key, val) {
  if(!state[key]) state[key]={};
  state[key].status = val;
  state[key].rep = myName||'Unknown';
  state[key].ts = Date.now();
  const sel = document.getElementById('sel_'+key);
  if(sel) { sel.className = 'door-select '+selClass(val); }
  const rc = document.getElementById('rep_'+key);
  if(rc) rc.textContent = myName ? '👤 '+myName : '';
  updateStats();
  updateStreetCounts();
  await pushState();
  if(val==='sold') showToast('🔥 Sale logged!');
}

async function saveNote(key) {
  const inp = document.getElementById('ninp_'+key);
  const val = inp.value.trim();
  if(!state[key]) state[key]={};
  state[key].note = val;
  state[key].rep = state[key].rep||myName||'Unknown';
  const btn = document.getElementById('nbtn_'+key);
  if(btn) btn.className = 'door-note-btn'+(val?' has-note':'');
  document.getElementById('nrow_'+key).classList.remove('open');
  await pushState();
  showToast('Note saved');
}

function refreshDoors() {
  const allDoors = [...DOORS_T1, ...DOORS_T2];
  allDoors.forEach(d => {
    const key = doorKey(d.n, d.s);
    const s = state[key]||{};
    const sel = document.getElementById('sel_'+key);
    if(sel && sel.value !== (s.status||'')) {
      sel.value = s.status||'';
      sel.className = 'door-select '+selClass(s.status||'');
    }
    const ninp = document.getElementById('ninp_'+key);
    if(ninp && ninp.value !== (s.note||'')) ninp.value = s.note||'';
    const nbtn = document.getElementById('nbtn_'+key);
    if(nbtn) nbtn.className = 'door-note-btn'+(s.note?' has-note':'');
    const rc = document.getElementById('rep_'+key);
    if(rc) rc.textContent = s.rep ? '👤 '+s.rep : '';
  });
  updateStreetCounts();
}

function updateStats() {
  const doors = currentTerritory===1 ? DOORS_T1 : DOORS_T2;
  let sold=0, follow=0, noAns=0, worked=0;
  doors.forEach(d => {
    const s = state[doorKey(d.n,d.s)]||{};
    if(!s.status) return;
    worked++;
    if(s.status==='sold') sold++;
    else if(s.status==='follow') follow++;
    else if(s.status==='no'||s.status==='not-home') noAns++;
  });
  document.getElementById('statTotal').textContent = doors.length;
  document.getElementById('statSold').textContent = sold;
  document.getElementById('statFollow').textContent = follow;
  document.getElementById('statNo').textContent = noAns;
  document.getElementById('statWorked').textContent = worked;
}

function updateStreetCounts() {
  const allDoors = [...DOORS_T1,...DOORS_T2];
  const streets = [...new Set(allDoors.map(d=>d.s))];
  streets.forEach(streetName => {
    const sid = 'st_' + streetName.replace(/[^a-zA-Z0-9]/g,'_');
    const el = document.getElementById('sc_'+sid);
    if(!el) return;
    const doors = allDoors.filter(d=>d.s===streetName);
    let sold=0, worked=0;
    doors.forEach(d => {
      const s = state[doorKey(d.n,d.s)]||{};
      if(s.status) worked++;
      if(s.status==='sold') sold++;
    });
    el.textContent = worked>0 ? `${worked}/${doors.length}${sold>0?' · '+sold+' sold':''}` : '';
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

async function init() {
  if(myName) {
    document.getElementById('repLabel').textContent = '👤 '+myName;
    document.getElementById('nameBtn').textContent = '👤 '+myName;
    document.getElementById('nameBtn').classList.add('active');
  }
  buildZones('territory1', TERRITORY1, DOORS_T1);
  buildZones('territory2', TERRITORY2, DOORS_T2);
  await pullState();
  updateStats();
  updateStreetCounts();
  setInterval(async () => { await pullState(); updateStreetCounts(); }, 4000);
}

init();
</script>
</body>
</html>
